name: Documentation

on:
  push:
    branches:
      - master
    paths:
      # For the current generated documentation, these trigger paths are sufficient.
      # Long-term, job-level triggers are more appropriate.
      # https://how.wtf/run-workflow-step-or-job-based-on-file-changes-github-actions.html
      - src/fundus/publishers/**
      - scripts/generate_tables.py

  workflow_dispatch:

env:
  PYTHONPATH: .

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install Fundus
        run: pip install -e .[dev]

      - name: Generate 'supported_publishers.md'
        run: python scripts/generate_tables.py

      - name: Commit changes
        # [skip ci] prevents this commit from re-triggering the workflow.
        # https://github.com/stefanzweifel/git-auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate supported_publishers.md [skip ci]"
          file_pattern: docs
